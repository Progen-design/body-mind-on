name: Copy check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-copy:
    name: lint:copy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run copy lint
        run: npm run lint:copy
